name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: build
        run: make build

      - name: test
        run: make test

      - name: vet
        run: go vet ./src/...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags "-s -w \
            -X 'github.com/cappuch/cuardach/src/cmd.Version=${VERSION}' \
            -X 'github.com/cappuch/cuardach/src/cmd.CommitHash=${COMMIT}' \
            -X 'github.com/cappuch/cuardach/src/cmd.BuildDate=${DATE}'" \
            -o cuardach-${GOOS}-${GOARCH}${EXT} ./src/

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuardach-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cuardach-*

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: cuardach-*
